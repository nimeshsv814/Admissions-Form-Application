apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admission-http
  namespace: ad
spec:
  parentRefs:
    - name: kgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            - path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
      backendRefs:
        - name: admission-svc
          port: 3000